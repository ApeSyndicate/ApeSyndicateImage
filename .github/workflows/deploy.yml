name: Extract Multiple Zip Files and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Create Target Assets Directory
        run: mkdir -p nft-assets

      - name: Unzip Main Images Archive
        run: |
          if [ -f images.zip ]; then
            unzip -q -o images.zip -d nft-assets/
          fi

      - name: Unzip Numbered Images Archives
        run: |
          for i in {1..30}
          do
            if [ -f "images($i).zip" ]; then
              echo "Extracting images($i).zip ..."
              unzip -q -o "images($i).zip" -d nft-assets/
            fi
          done

      - name: Flatten Any Nested Folders
        run: |
          find nft-assets/ -mindepth 2 -type f -exec mv -t nft-assets/ {} +
          find nft-assets/ -type d -empty -delete

      - name: Verify Extracted Structural Content
        run: |
          echo "=== Total Images Extracted ==="
          ls -1 nft-assets/ | wc -l
          echo "=== Displaying First Few Assets ==="
          ls -la nft-assets/ | head -n 20
          
      - name: Setup Dynamic GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Finished NFT Directory Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './nft-assets'

      - name: Deploy Live Build onto GitHub Pages Infrastructures
        id: deployment
        uses: actions/deploy-pages@v4
