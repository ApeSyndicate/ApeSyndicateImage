name: Robust Part Zip Extract and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Create Target Assets Directory
        run: mkdir -p nft-assets

      - name: Extract Existing Zip Files Safely
        run: |
          echo "=== Starting Safe Extraction ==="
          shopt -s nocaseglob
          for i in {1..26}
          do
            FOUND_FILE=$(ls part$i.zip 2>/dev/null || true)
            if [ ! -z "$FOUND_FILE" ]; then
              echo "Extracting found archive: $FOUND_FILE ..."
              unzip -q -o "$FOUND_FILE" -d nft-assets/
            else
              echo "Warning: part$i.zip not found on root. Skipping safely."
            fi
          done

      - name: Flatten Nested Subfolders Safely
        run: |
          echo "=== Checking Target Directory ==="
          if [ -d "nft-assets" ] && [ "$(ls -A nft-assets 2>/dev/null)" ]; then
            echo "Moving inside assets to root layer..."
            find nft-assets/ -type f -exec mv -t nft-assets/ {} +
            echo "Cleaning empty directories..."
            find nft-assets/ -mindepth 1 -type d -delete || true
          else
            echo "Error: Extraction directory is completely empty! Please verify your zip uploads."
            exit 1
          fi

      - name: Verify Extracted Structural Content
        run: |
          echo "=== Total Images Extracted ==="
          ls -1 nft-assets/ | wc -l
          echo "=== Displaying Extracted Assets ==="
          ls -la nft-assets/ | head -n 25
          
      - name: Setup Dynamic GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Finished NFT Directory Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './nft-assets'

      - name: Deploy Live Build onto GitHub Pages Infrastructures
        id: deployment
        uses: actions/deploy-pages@v4
