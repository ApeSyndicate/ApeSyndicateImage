name: Extract Part Zip Files and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Create Target Assets Directory
        run: mkdir -p nft-assets

      - name: Unzip All Part Archives Automatically
        run: |
          for i in {1..26}
          do
            if [ -f "part$i.zip" ]; then
              echo "Extracting part$i.zip ..."
              unzip -q -o "part$i.zip" -d nft-assets/
            else
              echo "Notice: part$i.zip not found, skipping."
            fi
          done

      - name: Flatten All Nested Subfolders and Files
        run: |
          echo "Moving all inner images out of subfolders..."
          find nft-assets/ -type f -exec mv -t nft-assets/ {} +
          echo "Removing empty subdirectories..."
          find nft-assets/ -mindepth 1 -type d -delete || true

      - name: Verify Extracted Structural Content
        run: |
          echo "=== Total Images Successfully Extracted ==="
          ls -1 nft-assets/ | wc -l
          echo "=== Previewing Extracted Asset Filenames ==="
          ls -la nft-assets/ | head -n 25
          
      - name: Setup Dynamic GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Finished NFT Directory Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './nft-assets'

      - name: Deploy Live Build onto GitHub Pages Infrastructures
        id: deployment
        uses: actions/deploy-pages@v4
